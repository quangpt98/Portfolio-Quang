<html lang="de">

    <meta charset="UTF-8">

            <a href="education.html">Werdegang</a>

        </nav>

    <section class="contact-section">
        <h2 class="heading">Kontaktieren Sie <span>Mich</span></h2>
        
        <form action="#">
            <div class="input-group">
                <div class="input-box">
                    <input type="text" placeholder="Vorname" required>
                    <input type="text" placeholder="Nachname" required>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="E-Mail Adresse" required>
                    <input type="text" placeholder="Betreff">
                </div>
            </div>
            <textarea cols="30" rows="10" placeholder="Ihre Nachricht" required></textarea>
            <input type="submit" value="Nachricht senden" class="btn">
        </form>
    </section>

    <footer>

        <p>Email: <a href="mailto:thequang.pham@gfn.education"><span>thequang.pham@gfn.education</a></span></p>
